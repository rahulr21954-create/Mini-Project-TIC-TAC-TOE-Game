<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="name"><h2>Make Fun</h2></div>
    <main>
    <div class="container">
        <div class="helperContainer">
            <h2>
                <p style="color: #fc6f59;">Tic</p>
                <p style="color: #FF5E46;">Tac</p>
                <p style="color: #db4e39;">Toe</p>
            </h2>
            <p>Classic game! Endless Fun.</p>
            <div class="scoreBoxContainer">
                <div class="scoreBox">
                    <div class="player1">
                        <div>Player1</div>
                        <div class="player1Score">0</div>
                    </div>
                    <div class="draws">
                        <div>Draws</div>
                        <div class="drawsScore">0</div>
                    </div>
                    <div class="player2">
                        <div>Player2</div>
                        <div class="player2Score">0</div>
                    </div>
                </div>
            </div>
            <div class="mainContainer">
                <div class="rows">
                    <div class="row1">
                        <div class="box box1"></div>
                        <div class="box box2"></div>
                        <div class="box box3"></div>
                    </div>
                    <div class="row2">
                        <div class="box box4"></div>
                        <div class="box box5"></div>
                        <div class="box box6"></div>
                    </div>
                    <div class="row3">
                        <div class="box box7"></div>
                        <div class="box box8"></div>
                        <div class="box box9"></div>
                    </div>
                </div>
            </div>
            <div class="reset">
            <button onclick="location.reload()">Reset</button>
         </div>
         </div>
         
    </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
